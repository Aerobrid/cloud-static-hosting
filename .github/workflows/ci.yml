name: CI Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-verify:
    name: Verify ${{ matrix.service }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        # to test all 4 microservices independently in parallel
        service: [frontend, upload-service, deploy-service, request-handler]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'

    - name: Install Dependencies
      working-directory: ./${{ matrix.service }}
      run: npm install

    - name: Build Service
      working-directory: ./${{ matrix.service }}
      run: npm run build
